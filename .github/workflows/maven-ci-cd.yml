# .github/workflows/maven-ci-cd.yml
name: Java CI/CD with Maven

on:
  push:
    branches:
      - main
      - master
      - develop

env:
  JAVA_VERSION: '21'
  MAVEN_ARGS: --batch-mode --no-transfer-progress --file pom.xml

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn $MAVEN_ARGS verify

  deploy-snapshot:
    name: Deploy SNAPSHOT to Sonatype
    needs: build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: OSSRH_USERNAME
          server-password: OSSRH_TOKEN

      - name: Validate SNAPSHOT version
        run: |
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Current version: $CURRENT_VERSION"
          if [[ "$CURRENT_VERSION" != *-SNAPSHOT ]]; then
            echo "::error::develop must use a -SNAPSHOT version before deploying snapshots."
            exit 1
          fi

      - name: Deploy SNAPSHOT to Sonatype Central
        run: mvn $MAVEN_ARGS deploy
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}

  release:
    name: Release to Sonatype Central
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permiso para crear releases
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para el historial completo para generar las notas de la release

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: OSSRH_USERNAME
          server-password: OSSRH_TOKEN

      - name: Set release version
        id: set_version
        run: |
          # Extrae la versión del POM, ej: "1.0.0-SNAPSHOT"
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          if [[ "$CURRENT_VERSION" != *-SNAPSHOT ]]; then
            echo "::error::Release branches must receive a -SNAPSHOT version so the workflow can derive the release version."
            exit 1
          fi
          # Quita "-SNAPSHOT" para obtener la versión de release, ej: "1.0.0"
          RELEASE_VERSION=${CURRENT_VERSION%-SNAPSHOT}
          echo "Current version: $CURRENT_VERSION"
          echo "Release version: $RELEASE_VERSION"
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> $GITHUB_ENV
          # Actualiza el pom.xml en el runner a la versión de release
          mvn $MAVEN_ARGS versions:set -DnewVersion=$RELEASE_VERSION -DgenerateBackupPoms=false

      - name: Deploy Release to Sonatype Central
        run: |
          if [ -z "$MAVEN_GPG_KEY" ]; then
            echo "::error::Missing GitHub secret: GPG_PRIVATE_KEY or MAVEN_GPG_KEY"
            exit 1
          fi
          if [ -z "$MAVEN_GPG_PASSPHRASE" ]; then
            echo "::error::Missing GitHub secret: GPG_PASSPHRASE, GPG_PASSPHARSE, or MAVEN_GPG_PASSPHRASE"
            exit 1
          fi
          mvn $MAVEN_ARGS clean deploy -P release
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_KEY: ${{ secrets.MAVEN_GPG_KEY || secrets.GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE || secrets.GPG_PASSPHRASE || secrets.GPG_PASSPHARSE }}

      - name: Create GitHub Release and Tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: Release ${{ env.RELEASE_VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
